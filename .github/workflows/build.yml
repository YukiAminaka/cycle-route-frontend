name: Build Test

on:
  pull_request:

# 同じブランチでワークフローが重複して実行されたとき、古いワークフローを自動キャンセルする
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # *.test.ts, *.spec.tsの型チェックがbuildでは行われないため追加：https://github.com/vercel/next.js/issues/56333
      - run: pnpm exec tsc --noEmit

      # リントチェック (next.js v16ではbuild時にlintが走らなくなったため追加)
      - run: pnpm lint

      # ビルドが通るかのテスト
      - run: pnpm build
