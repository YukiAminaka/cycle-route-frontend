version: 2
updates:
  - package-ecosystem: "github-actions" # GitHub Actionsの更新チェック
    directory: "/"
    schedule:
      interval: "weekly"
      time: "01:00" # 更新が行われる時間 (UTC)
      day: "saturday"
    groups:
      dependencies:
        patterns:
          - "*" # 全てのアップデートをひとまとめにする

  - package-ecosystem: "npm" # pnpmの更新チェック
    directory: "/"
    schedule:
      interval: "weekly"
      time: "01:00"
      day: "saturday"
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"] # メジャーアップデートは無視する
